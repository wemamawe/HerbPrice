<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中医病症治疗成本分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root {
    --bg: #0f172a; --card: #1e293b; --border: #334155;
    --text: #e2e8f0; --text-dim: #94a3b8; --accent: #3b82f6;
    --orange: #f97316; --green: #22c55e; --red: #ef4444;
    --purple: #a855f7; --amber: #f59e0b; --cyan: #06b6d4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
  header { text-align: center; padding: 24px 0 16px; }
  header h1 { font-size: 26px; font-weight: 700; letter-spacing: 1px; }
  header h1 span { color: var(--amber); }
  header p { color: var(--text-dim); font-size: 14px; margin-top: 6px; }
  header .nav { margin-top: 12px; }
  header .nav a {
    color: var(--accent); text-decoration: none; font-size: 13px;
    padding: 4px 12px; border: 1px solid var(--accent); border-radius: 6px;
    transition: all 0.2s;
  }
  header .nav a:hover { background: var(--accent); color: #fff; }

  /* Overview Cards */
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; text-align: center;
  }
  .stat-card .value { font-size: 28px; font-weight: 700; color: var(--accent); }
  .stat-card .label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  /* Search & Layout */
  .main-grid {
    display: grid; grid-template-columns: 320px 1fr; gap: 16px;
  }
  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
  }
  .panel h3 {
    font-size: 14px; color: var(--text-dim); margin-bottom: 12px;
    text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
  }

  .search-box {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); padding: 10px 14px;
    font-size: 14px; outline: none; margin-bottom: 12px;
  }
  .search-box:focus { border-color: var(--accent); }

  .symptom-list {
    max-height: 600px; overflow-y: auto;
  }
  .symptom-list::-webkit-scrollbar { width: 6px; }
  .symptom-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .symptom-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    transition: background 0.15s; border-left: 3px solid transparent;
  }
  .symptom-item:hover { background: rgba(59, 130, 246, 0.1); }
  .symptom-item.active {
    background: rgba(59, 130, 246, 0.15); border-left-color: var(--accent);
  }
  .symptom-item .name { font-size: 14px; font-weight: 500; }
  .symptom-item .count {
    font-size: 12px; color: var(--text-dim);
    background: var(--bg); padding: 2px 8px; border-radius: 10px;
  }

  /* Right detail panel */
  .detail-empty {
    text-align: center; padding: 80px 20px; color: var(--text-dim);
  }
  .detail-empty .icon { font-size: 48px; margin-bottom: 12px; }
  .detail-empty p { font-size: 14px; }

  .cost-summary {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px; margin-bottom: 16px;
  }
  .cost-box {
    background: var(--bg); border-radius: 8px; padding: 12px; text-align: center;
  }
  .cost-box .val { font-size: 20px; font-weight: 700; }
  .cost-box .lbl { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .cost-box.green .val { color: var(--green); }
  .cost-box.amber .val { color: var(--amber); }
  .cost-box.red .val { color: var(--red); }
  .cost-box.cyan .val { color: var(--cyan); }

  .chart-box {
    width: 100%; height: 350px; margin-bottom: 16px;
  }

  /* Formula cards */
  .formula-list { max-height: 800px; overflow-y: auto; }
  .formula-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; margin-bottom: 10px; transition: border-color 0.2s;
  }
  .formula-card:hover { border-color: var(--accent); }
  .formula-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; cursor: pointer;
  }
  .formula-header .fname { font-size: 16px; font-weight: 600; }
  .formula-header .fsource { font-size: 12px; color: var(--text-dim); }
  .formula-header .fprice { font-size: 18px; font-weight: 700; color: var(--amber); }
  .formula-tags {
    display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px;
  }
  .formula-tags span {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: rgba(59, 130, 246, 0.15); color: var(--accent);
  }
  .formula-herbs {
    display: none; margin-top: 10px;
  }
  .formula-herbs.show { display: block; }
  .herb-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .herb-table th {
    text-align: left; padding: 6px 8px; color: var(--text-dim);
    border-bottom: 1px solid var(--border); font-weight: 500; font-size: 12px;
  }
  .herb-table td {
    padding: 5px 8px; border-bottom: 1px solid rgba(51,65,85,0.5);
  }
  .herb-table tr:hover td { background: rgba(59, 130, 246, 0.05); }
  .no-price { color: var(--text-dim); font-style: italic; }
  .herb-bar {
    height: 4px; border-radius: 2px; background: var(--accent);
    margin-top: 2px; transition: width 0.3s;
  }

  .loading { text-align: center; padding: 40px; color: var(--text-dim); }
  .loading::after {
    content: ''; display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin-left: 8px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🏥 中医病症<span>治疗成本</span>分析</h1>
    <p>基于古籍处方 × 实时药材价格，估算各病症的中药治疗费用</p>
    <div class="nav"><a href="/">← 药材价格趋势</a></div>
  </header>

  <!-- Overview Stats -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="value" id="sFormulaCount">-</div><div class="label">古籍处方</div></div>
    <div class="stat-card"><div class="value" id="sHerbCount">-</div><div class="label">涉及药材</div></div>
    <div class="stat-card"><div class="value" id="sSymptomCount">-</div><div class="label">可分析病症</div></div>
    <div class="stat-card"><div class="value" id="sPriceMatch">-</div><div class="label">有实时价格</div></div>
    <div class="stat-card"><div class="value" id="sSourceCount">-</div><div class="label">古籍来源</div></div>
  </div>

  <!-- Main Grid -->
  <div class="main-grid">
    <!-- Left: Symptom list -->
    <div class="panel">
      <h3>🔍 选择病症</h3>
      <input class="search-box" id="searchInput" placeholder="搜索病症..." autocomplete="off">
      <div class="symptom-list" id="symptomList">
        <div class="loading">加载中</div>
      </div>
    </div>

    <!-- Right: Detail -->
    <div class="panel" id="detailPanel">
      <div class="detail-empty" id="emptyState">
        <div class="icon">📋</div>
        <p>从左侧选择一个病症，查看治疗方案及费用明细</p>
      </div>
      <div id="detailContent" style="display:none">
        <h3 id="detailTitle">-</h3>

        <!-- Cost Summary -->
        <div class="cost-summary">
          <div class="cost-box green"><div class="val" id="cMedian">-</div><div class="lbl">单剂中位价</div></div>
          <div class="cost-box amber"><div class="val" id="cAvg">-</div><div class="lbl">单剂均价(去极值)</div></div>
          <div class="cost-box cyan"><div class="val" id="cCourse">-</div><div class="lbl">7天疗程中位价</div></div>
          <div class="cost-box red"><div class="val" id="cRange">-</div><div class="lbl">价格区间</div></div>
        </div>

        <!-- Chart -->
        <div class="chart-box" id="costChart"></div>

        <!-- Formula List -->
        <h3>📜 处方列表 (<span id="formulaTotal">0</span> 个)</h3>
        <div class="formula-list" id="formulaList"></div>
      </div>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let allSymptoms = [];
let costChart = null;

// ── Load Overview ──
async function loadOverview() {
  try {
    const res = await fetch('/api/tcm/overview');
    const d = await res.json();
    $('#sFormulaCount').textContent = d.formulaCount.toLocaleString();
    $('#sHerbCount').textContent = d.herbCount;
    $('#sSymptomCount').textContent = d.symptomCount;
    $('#sPriceMatch').textContent = d.priceMatchCount;
    $('#sSourceCount').textContent = d.sources.length;
  } catch(e) { console.error('overview error', e); }
}

// ── Load Symptom List ──
async function loadSymptoms() {
  try {
    const res = await fetch('/api/tcm/symptoms');
    allSymptoms = await res.json();
    renderSymptoms(allSymptoms);
  } catch(e) {
    $('#symptomList').innerHTML = '<p style="color:var(--red);padding:12px">加载失败</p>';
  }
}

function renderSymptoms(list) {
  const html = list.map(s => `
    <div class="symptom-item" data-symptom="${s.symptom}" onclick="selectSymptom('${s.symptom}', this)">
      <span class="name">${s.symptom}</span>
      <span class="count">${s.formulaCount} 方</span>
    </div>
  `).join('');
  $('#symptomList').innerHTML = html || '<p style="color:var(--text-dim);padding:12px">无匹配结果</p>';
}

$('#searchInput').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  if (!q) { renderSymptoms(allSymptoms); return; }
  renderSymptoms(allSymptoms.filter(s => s.symptom.includes(q)));
});

// ── Select Symptom ──
let currentSymptom = '';
let currentPage = 1;
let totalPages = 1;
let isLoadingMore = false;

async function selectSymptom(symptom, el) {
  document.querySelectorAll('.symptom-item').forEach(e => e.classList.remove('active'));
  if (el) el.classList.add('active');

  currentSymptom = symptom;
  currentPage = 1;
  totalPages = 1;

  $('#emptyState').style.display = 'none';
  $('#detailContent').style.display = 'block';
  $('#detailTitle').textContent = `🏥 ${symptom} — 治疗方案`;
  $('#formulaList').innerHTML = '<div class="loading">正在计算成本</div>';

  try {
    const res = await fetch(`/api/tcm/symptom_cost?symptom=${encodeURIComponent(symptom)}&page=1&page_size=20&detail=1`);
    const d = await res.json();
    totalPages = d.totalPages || 1;
    renderDetail(d, false);
  } catch(e) {
    $('#formulaList').innerHTML = '<p style="color:var(--red)">加载失败</p>';
  }
}

async function loadMoreFormulas() {
  if (isLoadingMore || currentPage >= totalPages) return;
  isLoadingMore = true;
  currentPage++;

  const btn = $('#loadMoreBtn');
  if (btn) btn.textContent = '加载中…';

  try {
    const res = await fetch(`/api/tcm/symptom_cost?symptom=${encodeURIComponent(currentSymptom)}&page=${currentPage}&page_size=20&detail=1`);
    const d = await res.json();
    renderDetail(d, true);
  } catch(e) {
    currentPage--;
  }
  isLoadingMore = false;
}

// ── Render Detail ──
function renderDetail(data, append) {
  if (!data.formulas || data.formulas.length === 0) {
    if (!append) {
      $('#formulaList').innerHTML = '<p style="color:var(--text-dim);padding:20px">暂无可计算成本的处方</p>';
    }
    return;
  }

  if (!append) {
    const s = data.stats;
    $('#cMedian').textContent = `¥${s.median_single.toFixed(2)}`;
    $('#cAvg').textContent = `¥${s.avg_single.toFixed(2)}`;
    $('#cCourse').textContent = `¥${s.median_course.toFixed(2)}`;
    $('#cRange').textContent = `¥${s.min_single.toFixed(0)}–${s.max_single.toFixed(0)}`;
    $('#formulaTotal').textContent = data.formulaCount;

    // 优先用后端全量分布数据
    if (data.costDistribution) {
      renderCostChartFromDistribution(data.costDistribution);
    } else {
      renderCostChart(data.formulas);
    }
  }

  const cards = data.formulas.map((f, i) => {
    const hasHerbs = f.herbs && f.herbs.length > 0;
    let herbSection = '';

    if (hasHerbs) {
      const maxCost = Math.max(...f.herbs.filter(h => h.hasPrice).map(h => h.cost), 0.01);
      const herbRows = f.herbs.map(h => {
        if (!h.hasPrice) return `<tr><td>${h.name}</td><td>${h.dosageG.toFixed(1)}g</td><td class="no-price">无报价</td><td>-</td></tr>`;
        const barW = Math.max(4, (h.cost / maxCost) * 100);
        return `<tr>
          <td>${h.name}</td>
          <td>${h.dosageG.toFixed(1)}g</td>
          <td>¥${h.pricePerKg.toFixed(0)}/kg</td>
          <td>¥${h.cost.toFixed(2)}<div class="herb-bar" style="width:${barW}%"></div></td>
        </tr>`;
      }).join('');

      herbSection = `<div class="formula-herbs" ${!append && i === 0 ? 'class="formula-herbs show"' : ''}>
        <table class="herb-table">
          <tr><th>药材</th><th>用量</th><th>单价</th><th>费用</th></tr>
          ${herbRows}
        </table>
      </div>`;
    }

    const symptoms = (f.symptoms || []).map(s => `<span>${s}</span>`).join('');

    return `<div class="formula-card">
      <div class="formula-header" onclick="this.parentElement.querySelector('.formula-herbs')?.classList.toggle('show')">
        <div>
          <span class="fname">${f.name}</span>
          <span class="fsource">${f.source} · ${f.herbCount}味 · 匹配${f.matchRate}%</span>
        </div>
        <span class="fprice">¥${f.costSingle.toFixed(2)}/剂</span>
      </div>
      <div class="formula-tags">${symptoms}</div>
      ${herbSection}
    </div>`;
  }).join('');

  if (append) {
    // 移除旧的"加载更多"按钮，追加新卡片
    const oldBtn = $('#loadMoreBtn');
    if (oldBtn) oldBtn.remove();
    $('#formulaList').insertAdjacentHTML('beforeend', cards);
  } else {
    $('#formulaList').innerHTML = cards;
    // 展开第一个处方的药材详情
    const firstHerbs = document.querySelector('.formula-herbs');
    if (firstHerbs) firstHerbs.classList.add('show');
  }

  // 如果还有更多页，添加"加载更多"按钮
  if (currentPage < totalPages) {
    $('#formulaList').insertAdjacentHTML('beforeend',
      `<div id="loadMoreBtn" onclick="loadMoreFormulas()" style="
        text-align:center; padding:14px; cursor:pointer; color:var(--accent);
        font-size:14px; font-weight:500; border:1px dashed var(--border);
        border-radius:8px; margin-top:8px; transition:all 0.2s;
      " onmouseover="this.style.borderColor='var(--accent)'"
        onmouseout="this.style.borderColor='var(--border)'">
        加载更多（第 ${currentPage + 1}/${totalPages} 页）
      </div>`
    );
  }
}

// ── Cost Distribution Chart (from backend full data) ──
function renderCostChartFromDistribution(distribution) {
  if (!costChart) {
    costChart = echarts.init($('#costChart'));
    window.addEventListener('resize', () => costChart.resize());
  }
  costChart.setOption({
    backgroundColor: 'transparent',
    title: {
      text: '处方费用分布（单剂）',
      textStyle: { color: '#94a3b8', fontSize: 13, fontWeight: 500 },
      left: 0, top: 0,
    },
    tooltip: {
      trigger: 'axis',
      formatter: p => `${p[0].name}<br/>处方数: <b>${p[0].value}</b>`,
    },
    grid: { left: 50, right: 20, top: 40, bottom: 30 },
    xAxis: {
      type: 'category',
      data: distribution.map(b => b.label),
      axisLabel: { color: '#94a3b8', fontSize: 11 },
      axisLine: { lineStyle: { color: '#334155' } },
    },
    yAxis: {
      type: 'value',
      axisLabel: { color: '#94a3b8' },
      splitLine: { lineStyle: { color: '#1e293b' } },
    },
    series: [{
      type: 'bar',
      data: distribution.map(b => b.count),
      itemStyle: {
        borderRadius: [4, 4, 0, 0],
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: '#3b82f6' },
          { offset: 1, color: '#1e40af' },
        ]),
      },
      label: {
        show: true, position: 'top',
        color: '#94a3b8', fontSize: 11,
        formatter: p => p.value > 0 ? p.value : '',
      },
    }],
  });
}

// ── Cost Distribution Chart (from page formulas, fallback) ──
function renderCostChart(formulas) {
  if (!costChart) {
    costChart = echarts.init($('#costChart'));
    window.addEventListener('resize', () => costChart.resize());
  }

  // Bucket formulas by cost range
  const buckets = [
    { label: '0-5元', min: 0, max: 5, count: 0 },
    { label: '5-10元', min: 5, max: 10, count: 0 },
    { label: '10-20元', min: 10, max: 20, count: 0 },
    { label: '20-50元', min: 20, max: 50, count: 0 },
    { label: '50-100元', min: 50, max: 100, count: 0 },
    { label: '100-200元', min: 100, max: 200, count: 0 },
    { label: '200-500元', min: 200, max: 500, count: 0 },
    { label: '500+元', min: 500, max: Infinity, count: 0 },
  ];

  formulas.forEach(f => {
    for (const b of buckets) {
      if (f.costSingle >= b.min && f.costSingle < b.max) { b.count++; break; }
    }
  });

  costChart.setOption({
    backgroundColor: 'transparent',
    title: {
      text: '处方费用分布（单剂）',
      textStyle: { color: '#94a3b8', fontSize: 13, fontWeight: 500 },
      left: 0, top: 0,
    },
    tooltip: {
      trigger: 'axis',
      formatter: p => `${p[0].name}<br/>处方数: <b>${p[0].value}</b>`,
    },
    grid: { left: 50, right: 20, top: 40, bottom: 30 },
    xAxis: {
      type: 'category',
      data: buckets.map(b => b.label),
      axisLabel: { color: '#94a3b8', fontSize: 11 },
      axisLine: { lineStyle: { color: '#334155' } },
    },
    yAxis: {
      type: 'value',
      axisLabel: { color: '#94a3b8' },
      splitLine: { lineStyle: { color: '#1e293b' } },
    },
    series: [{
      type: 'bar',
      data: buckets.map(b => b.count),
      itemStyle: {
        borderRadius: [4, 4, 0, 0],
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: '#3b82f6' },
          { offset: 1, color: '#1e40af' },
        ]),
      },
      label: {
        show: true, position: 'top',
        color: '#94a3b8', fontSize: 11,
        formatter: p => p.value > 0 ? p.value : '',
      },
    }],
  });
}

// ── Init ──
loadOverview();
loadSymptoms();
</script>
</body>
</html>
