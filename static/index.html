<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>药材价格趋势</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent: #3b82f6;
    --orange: #f97316;
    --green: #22c55e;
    --red: #ef4444;
    --purple: #a855f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  header { text-align: center; padding: 24px 0 16px; }
  header h1 { font-size: 24px; font-weight: 600; letter-spacing: 1px; }
  header p { color: var(--text-dim); font-size: 14px; margin-top: 6px; }

  .controls {
    display: flex; gap: 12px; align-items: end; flex-wrap: wrap;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 16px;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; color: var(--text-dim); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .field.grow { flex: 1; min-width: 200px; }

  .search-wrap { position: relative; }
  .search-wrap input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 10px 14px; font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .dropdown {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    max-height: 320px; overflow-y: auto; display: none; margin-top: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .dropdown.show { display: block; }
  .dropdown-item {
    padding: 10px 14px; cursor: pointer; font-size: 14px;
    display: flex; justify-content: space-between; align-items: center; transition: background 0.15s;
  }
  .dropdown-item:hover, .dropdown-item.active { background: var(--accent); border-radius: 4px; }
  .dropdown-item .meta { font-size: 11px; color: var(--text-dim); }
  .dropdown-item:hover .meta { color: rgba(255,255,255,0.7); }

  input[type="date"] {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 10px 14px; font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  input[type="date"]:focus { border-color: var(--accent); }
  ::-webkit-calendar-picker-indicator { filter: invert(0.7); }

  .presets { display: flex; gap: 6px; align-items: end; }
  .preset-btn, .forecast-btn {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text-dim); padding: 10px 14px; font-size: 13px; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .preset-btn:hover, .forecast-btn:hover { border-color: var(--accent); color: var(--text); }
  .preset-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .forecast-btn {
    border-color: var(--purple); color: var(--purple); position: relative;
  }
  .forecast-btn:hover { background: var(--purple); color: #fff; }
  .forecast-btn.active { background: var(--purple); border-color: var(--purple); color: #fff; }
  .forecast-btn.loading { opacity: 0.6; pointer-events: none; }

  .chart-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; position: relative;
  }
  #chart { width: 100%; height: 520px; }
  .loading-overlay {
    position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(30,41,59,0.85); border-radius: 12px; z-index: 10;
    flex-direction: column; gap: 12px;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  .loading-overlay .hint { color: var(--text-dim); font-size: 13px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .stats { display: flex; gap: 16px; margin-top: 16px; flex-wrap: wrap; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 20px; flex: 1; min-width: 120px;
  }
  .stat-card .label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
  .stat-card .value { font-size: 18px; font-weight: 600; }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.red { color: var(--red); }
  .stat-card .value.blue { color: var(--accent); }
  .stat-card .value.orange { color: var(--orange); }
  .stat-card .value.purple { color: var(--purple); }
  .stat-card .sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 520px; color: var(--text-dim);
  }
  .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state p { font-size: 15px; }

  .method-badge {
    display: inline-block; background: rgba(168,85,247,0.15); color: var(--purple);
    border: 1px solid rgba(168,85,247,0.3); border-radius: 6px;
    padding: 4px 10px; font-size: 11px; margin-top: 8px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>药材价格趋势</h1>
    <p>覆盖 303 个品种 · 13 年历史数据 · 指数反推 + 实际价格 + AI 预测</p>
  </header>

  <div class="controls">
    <div class="field grow">
      <label>品种</label>
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="搜索品种名称…" autocomplete="off">
        <div class="dropdown" id="dropdown"></div>
      </div>
    </div>
    <div class="field">
      <label>开始日期</label>
      <input type="date" id="startDate">
    </div>
    <div class="field">
      <label>结束日期</label>
      <input type="date" id="endDate">
    </div>
    <div class="field presets">
      <button class="preset-btn" data-years="1">1年</button>
      <button class="preset-btn" data-years="3">3年</button>
      <button class="preset-btn active" data-years="5">5年</button>
      <button class="preset-btn" data-years="10">10年</button>
      <button class="preset-btn" data-years="0">全部</button>
      <button class="forecast-btn" id="forecastBtn" title="预测未来半年价格">预测</button>
    </div>
  </div>

  <div class="chart-card">
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <div class="hint" id="loadingHint">加载中…</div>
    </div>
    <div id="chart">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 3v18h18"/><path d="m7 14 4-4 4 4 5-5"/>
        </svg>
        <p>选择一个品种开始查看价格趋势</p>
      </div>
    </div>
  </div>

  <div class="stats" id="stats" style="display:none">
    <div class="stat-card"><div class="label">当前价格</div><div class="value blue" id="sCurrent">-</div></div>
    <div class="stat-card"><div class="label">最高价格</div><div class="value red" id="sMax">-</div></div>
    <div class="stat-card"><div class="label">最低价格</div><div class="value green" id="sMin">-</div></div>
    <div class="stat-card"><div class="label">区间涨跌</div><div class="value" id="sChange">-</div></div>
    <div class="stat-card"><div class="label">数据天数</div><div class="value" id="sCount">-</div></div>
    <div class="stat-card"><div class="label">K值偏差</div><div class="value orange" id="sKcv">-</div></div>
    <div class="stat-card" id="sForecastCard" style="display:none">
      <div class="label">半年预测</div>
      <div class="value purple" id="sForecast">-</div>
      <div class="sub" id="sForecastRange">-</div>
    </div>
  </div>
</div>

<script>
const searchInput = document.getElementById('searchInput');
const dropdown = document.getElementById('dropdown');
const startDate = document.getElementById('startDate');
const endDate = document.getElementById('endDate');
const loadingEl = document.getElementById('loading');
const loadingHint = document.getElementById('loadingHint');
const statsEl = document.getElementById('stats');
const forecastBtn = document.getElementById('forecastBtn');

let varieties = [];
let selectedName = '';
let chart = null;
let activePreset = 5;
let forecastData = null;
let showForecast = false;

async function init() {
  const resp = await fetch('/api/varieties');
  varieties = await resp.json();
  const today = new Date();
  endDate.value = fmt(today);
  setPreset(5);
  // 检查 URL 参数是否指定了品种和自动预测
  const urlParams = new URLSearchParams(window.location.search);
  const nameParam = urlParams.get('name') || '白术';
  const autoForecast = urlParams.get('forecast') === '1';
  selectVariety(nameParam);
  if (autoForecast) {
    // 等价格数据加载完后自动触发预测
    setTimeout(() => forecastBtn.click(), 500);
  }
}

function fmt(d) { return d.toISOString().slice(0, 10); }

function setPreset(years) {
  activePreset = years;
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.years) === years);
  });
  const today = new Date();
  endDate.value = fmt(today);
  if (years === 0) {
    startDate.value = '2013-04-16';
  } else {
    const d = new Date(today);
    d.setFullYear(d.getFullYear() - years);
    startDate.value = fmt(d);
  }
}

searchInput.addEventListener('focus', () => renderDropdown(searchInput.value));
searchInput.addEventListener('input', () => renderDropdown(searchInput.value));
document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-wrap')) dropdown.classList.remove('show');
});

function renderDropdown(q) {
  const filtered = q ? varieties.filter(v => v.name.includes(q)) : varieties;
  if (!filtered.length) {
    dropdown.innerHTML = '<div class="dropdown-item" style="color:var(--text-dim)">无匹配结果</div>';
  } else {
    dropdown.innerHTML = filtered.slice(0, 50).map(v =>
      `<div class="dropdown-item${v.name === selectedName ? ' active' : ''}" data-name="${v.name}">
        <span>${v.name}</span>
        <span class="meta">${v.minDate.slice(0,4)}~${v.maxDate.slice(0,4)} · ${v.count}天</span>
      </div>`
    ).join('');
  }
  dropdown.classList.add('show');
  dropdown.querySelectorAll('.dropdown-item[data-name]').forEach(el => {
    el.addEventListener('click', () => {
      selectVariety(el.dataset.name);
      dropdown.classList.remove('show');
    });
  });
}

function selectVariety(name) {
  selectedName = name;
  searchInput.value = name;
  forecastData = null;
  showForecast = false;
  forecastBtn.classList.remove('active');
  loadChart();
}

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    setPreset(parseInt(btn.dataset.years));
    if (selectedName) loadChart();
  });
});

startDate.addEventListener('change', () => {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  if (selectedName) loadChart();
});
endDate.addEventListener('change', () => {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  if (selectedName) loadChart();
});

// 预测按钮
forecastBtn.addEventListener('click', async () => {
  if (!selectedName) return;
  showForecast = !showForecast;
  forecastBtn.classList.toggle('active', showForecast);

  if (showForecast && !forecastData) {
    forecastBtn.classList.add('loading');
    forecastBtn.textContent = '计算中…';
    setLoading(true, '正在运行预测模型，请稍候…');
    try {
      const resp = await fetch(`/api/forecast?name=${encodeURIComponent(selectedName)}`);
      if (!resp.ok) throw new Error('预测请求失败');
      forecastData = await resp.json();
    } catch (e) {
      forecastData = null;
      showForecast = false;
      forecastBtn.classList.remove('active');
    }
    forecastBtn.classList.remove('loading');
    forecastBtn.textContent = '预测';
    setLoading(false);
  }

  loadChart();
});

function setLoading(on, hint) {
  if (on) {
    loadingHint.textContent = hint || '加载中…';
    loadingEl.classList.add('show');
  } else {
    loadingEl.classList.remove('show');
  }
}

async function loadChart() {
  if (!selectedName) return;
  setLoading(true);

  const params = new URLSearchParams({ name: selectedName });
  if (startDate.value) params.set('start', startDate.value);
  if (endDate.value) params.set('end', endDate.value);

  const [priceResp, kResp] = await Promise.all([
    fetch(`/api/prices?${params}`),
    fetch(`/api/k_value?name=${encodeURIComponent(selectedName)}`),
  ]);
  const priceData = await priceResp.json();
  const kData = await kResp.json();

  renderChart(priceData, kData, showForecast ? forecastData : null);
  renderStats(priceData, kData, showForecast ? forecastData : null);
  setLoading(false);
}

function renderChart(priceData, kData, fc) {
  const el = document.getElementById('chart');
  el.innerHTML = '';
  if (!chart) {
    chart = echarts.init(el, 'dark');
    window.addEventListener('resize', () => chart?.resize());
  } else {
    chart.dispose();
    chart = echarts.init(el, 'dark');
  }

  const { data } = priceData;
  if (!data.length) {
    el.innerHTML = '<div class="empty-state"><p>该时间范围内无数据</p></div>';
    chart = null;
    return;
  }

  // 拆分 estimated / actual
  const estDates = [], estPrices = [], actDates = [], actPrices = [];
  let switchIdx = -1;
  data.forEach((d, i) => {
    if (d.source === 'actual') {
      if (switchIdx < 0) switchIdx = i;
      actDates.push(d.date);
      actPrices.push(d.price);
    } else {
      estDates.push(d.date);
      estPrices.push(d.price);
    }
  });
  if (actDates.length && estDates.length) {
    estDates.push(actDates[0]);
    estPrices.push(actPrices[0]);
  }

  // 构建完整日期轴（历史 + 预测）
  let allDates = data.map(d => d.date);
  let fcDates = [], fcPrices = [], fcLower = [], fcUpper = [];

  if (fc && fc.forecast) {
    fc.forecast.forEach(f => {
      if (!allDates.includes(f.date)) {
        allDates.push(f.date);
      }
      fcDates.push(f.date);
      fcPrices.push(f.price);
      fcLower.push(f.lower);
      fcUpper.push(f.upper);
    });
  }

  const allPricesHist = data.map(d => d.price);
  const legendData = ['估算价格', '实际价格'];
  if (fc) legendData.push('预测价格');

  const option = {
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'axis',
      backgroundColor: 'rgba(30,41,59,0.95)',
      borderColor: '#334155',
      textStyle: { color: '#e2e8f0', fontSize: 13 },
      formatter: (params) => {
        let html = `<b>${params[0]?.axisValue || ''}</b>`;
        params.forEach(p => {
          if (p.value == null) return;
          if (p.seriesName === '置信上界' || p.seriesName === '置信下界') return;
          const color = p.color || '#fff';
          html += `<br/><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:6px"></span>`;
          html += `${p.seriesName}：¥${p.value}`;
        });
        // 置信区间
        const lowerP = params.find(p => p.seriesName === '置信下界');
        const upperP = params.find(p => p.seriesName === '置信上界');
        if (lowerP?.value != null && upperP?.value != null) {
          html += `<br/><span style="color:#94a3b8">80%区间：¥${lowerP.value} ~ ¥${upperP.value}</span>`;
        }
        return html;
      }
    },
    legend: {
      data: legendData, top: 8, right: 20,
      textStyle: { color: '#94a3b8' },
    },
    grid: { left: 60, right: 30, top: 50, bottom: 60 },
    xAxis: {
      type: 'category', data: allDates,
      axisLabel: {
        color: '#64748b', formatter: v => v.slice(0, 7),
        interval: Math.max(Math.floor(allDates.length / 14), 1),
      },
      axisLine: { lineStyle: { color: '#334155' } },
      splitLine: { show: false },
    },
    yAxis: {
      type: 'value', name: '元/kg',
      nameTextStyle: { color: '#64748b' },
      axisLabel: { color: '#64748b', formatter: '¥{value}' },
      axisLine: { show: false },
      splitLine: { lineStyle: { color: '#1e293b' } },
    },
    dataZoom: [
      { type: 'inside', start: 0, end: 100 },
      {
        type: 'slider', start: 0, end: 100, height: 24, bottom: 8,
        borderColor: '#334155', backgroundColor: '#0f172a',
        fillerColor: 'rgba(59,130,246,0.15)',
        handleStyle: { color: '#3b82f6', borderColor: '#3b82f6' },
        textStyle: { color: '#64748b' },
        dataBackground: {
          lineStyle: { color: '#334155' },
          areaStyle: { color: 'rgba(59,130,246,0.05)' },
        },
      }
    ],
    series: [],
  };

  // 估算价格
  option.series.push({
    name: '估算价格', type: 'line',
    data: allDates.map(d => { const i = estDates.indexOf(d); return i >= 0 ? estPrices[i] : null; }),
    symbol: 'none',
    lineStyle: { color: '#3b82f6', width: 2 },
    areaStyle: {
      color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
        { offset: 0, color: 'rgba(59,130,246,0.15)' },
        { offset: 1, color: 'rgba(59,130,246,0)' },
      ]),
    },
    connectNulls: false,
  });

  // 实际价格
  option.series.push({
    name: '实际价格', type: 'line',
    data: allDates.map(d => { const i = actDates.indexOf(d); return i >= 0 ? actPrices[i] : null; }),
    symbol: 'none',
    lineStyle: { color: '#f97316', width: 2 },
    areaStyle: {
      color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
        { offset: 0, color: 'rgba(249,115,22,0.15)' },
        { offset: 1, color: 'rgba(249,115,22,0)' },
      ]),
    },
    connectNulls: false,
  });

  // 预测
  if (fc && fc.forecast) {
    // 衔接点：最后一个实际价格 → 第一个预测
    const bridgeDates = [data[data.length - 1].date, ...fcDates];
    const bridgePrices = [data[data.length - 1].price, ...fcPrices];
    const bridgeLower = [data[data.length - 1].price, ...fcLower];
    const bridgeUpper = [data[data.length - 1].price, ...fcUpper];

    // 预测中位线
    option.series.push({
      name: '预测价格', type: 'line',
      data: allDates.map(d => { const i = bridgeDates.indexOf(d); return i >= 0 ? bridgePrices[i] : null; }),
      symbol: 'none',
      lineStyle: { color: '#a855f7', width: 2.5, type: 'dashed' },
      connectNulls: false,
      z: 5,
    });

    // 置信区间（用两条线 + areaStyle 填充）
    option.series.push({
      name: '置信上界', type: 'line',
      data: allDates.map(d => { const i = bridgeDates.indexOf(d); return i >= 0 ? bridgeUpper[i] : null; }),
      symbol: 'none',
      lineStyle: { opacity: 0 },
      connectNulls: false,
      stack: 'confidence',
      z: 2,
    });
    option.series.push({
      name: '置信下界', type: 'line',
      data: allDates.map(d => { const i = bridgeDates.indexOf(d); return i >= 0 ? bridgeLower[i] : null; }),
      symbol: 'none',
      lineStyle: { opacity: 0 },
      areaStyle: { color: 'rgba(168,85,247,0.12)' },
      connectNulls: false,
      z: 2,
    });
    // 从 legend 隐藏置信线
    option.legend.data = legendData;
    option.legend.selected = { '置信上界': true, '置信下界': true };

    // 预测起点标记线
    const forecastStart = fc.forecast[0].date;
    option.series.push({
      type: 'line', data: [], markLine: {
        silent: true, symbol: 'none',
        lineStyle: { color: '#a855f7', type: 'dashed', width: 1 },
        label: { show: true, formatter: '← 预测区间', color: '#a855f7', fontSize: 11, position: 'insideEndTop' },
        data: [{ xAxis: forecastStart }],
      },
    });
  }

  // 估算/实际分界线
  if (switchIdx > 0 && switchIdx < data.length - 1) {
    option.series.push({
      type: 'line', data: [], markLine: {
        silent: true, symbol: 'none',
        lineStyle: { color: '#475569', type: 'dashed', width: 1 },
        label: { show: true, formatter: '实际数据 →', color: '#64748b', fontSize: 11, position: 'insideStartTop' },
        data: [{ xAxis: allDates[switchIdx] }],
      },
    });
  }

  chart.setOption(option);

  // 如果有预测，滚动到能看到预测区间
  if (fc && fc.forecast) {
    const totalLen = allDates.length;
    const histLen = data.length;
    const startPct = Math.max(0, (histLen - 365) / totalLen * 100);
    chart.dispatchAction({ type: 'dataZoom', start: startPct, end: 100 });
  }
}

function renderStats(priceData, kData, fc) {
  const { data } = priceData;
  if (!data.length) { statsEl.style.display = 'none'; return; }

  statsEl.style.display = 'flex';
  const prices = data.map(d => d.price);
  const first = prices[0], last = prices[prices.length - 1];
  const change = last - first;
  const changePct = (change / first * 100).toFixed(1);

  document.getElementById('sCurrent').textContent = `¥${last.toFixed(1)}`;
  document.getElementById('sMax').textContent = `¥${Math.max(...prices).toFixed(1)}`;
  document.getElementById('sMin').textContent = `¥${Math.min(...prices).toFixed(1)}`;

  const changeEl = document.getElementById('sChange');
  changeEl.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(1)} (${change >= 0 ? '+' : ''}${changePct}%)`;
  changeEl.className = `value ${change >= 0 ? 'red' : 'green'}`;

  document.getElementById('sCount').textContent = `${data.length} 天`;
  document.getElementById('sKcv').textContent = kData ? `CV ${kData.kCv}%` : '-';

  // 预测统计
  const fcCard = document.getElementById('sForecastCard');
  if (fc && fc.forecast && fc.forecast.length) {
    fcCard.style.display = '';
    const lastFc = fc.forecast[fc.forecast.length - 1];
    const fcChange = lastFc.price - last;
    const fcPct = (fcChange / last * 100).toFixed(1);
    document.getElementById('sForecast').textContent =
      `¥${lastFc.price} (${fcChange >= 0 ? '+' : ''}${fcPct}%)`;
    document.getElementById('sForecastRange').textContent =
      `80%区间: ¥${lastFc.lower} ~ ¥${lastFc.upper}`;
  } else {
    fcCard.style.display = 'none';
  }
}

init();
</script>
</body>
</html>
