<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本草价鉴 · 药材价格趋势</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent: #3b82f6;
    --orange: #f97316;
    --green: #22c55e;
    --red: #ef4444;
    --purple: #a855f7;
    --teal: #14b8a6;
    --yellow: #eab308;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  .container { max-width: 1280px; margin: 0 auto; padding: 20px; }
  header { text-align: center; padding: 24px 0 16px; }
  header h1 { font-size: 24px; font-weight: 600; letter-spacing: 1px; }
  header p { color: var(--text-dim); font-size: 13px; margin-top: 6px; }

  /* ── Controls ── */
  .controls {
    display: flex; gap: 12px; align-items: end; flex-wrap: wrap;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 14px;
  }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; color: var(--text-dim); font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.5px; }
  .field.grow { flex: 1; min-width: 200px; }

  .search-wrap { position: relative; }
  .search-wrap input, input[type="date"] {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 9px 13px; font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .search-wrap input { width: 100%; }
  .search-wrap input:focus, input[type="date"]:focus { border-color: var(--accent); }
  ::-webkit-calendar-picker-indicator { filter: invert(0.7); }
  .dropdown {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 200;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    max-height: 320px; overflow-y: auto; display: none; margin-top: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .dropdown.show { display: block; }
  .dropdown-item {
    padding: 9px 14px; cursor: pointer; font-size: 14px;
    display: flex; justify-content: space-between; align-items: center; transition: background 0.15s;
  }
  .dropdown-item:hover, .dropdown-item.active { background: var(--accent); border-radius: 4px; }
  .dropdown-item .meta { font-size: 11px; color: var(--text-dim); }
  .dropdown-item:hover .meta { color: rgba(255,255,255,0.7); }

  /* ── Buttons ── */
  .btn-row { display: flex; gap: 6px; align-items: end; }
  .btn {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text-dim); padding: 9px 13px; font-size: 13px; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--text); }
  .btn.active-blue { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.active-purple { background: var(--purple); border-color: var(--purple); color: #fff; }
  .btn.disabled { opacity: 0.45; pointer-events: none; }

  /* ── Engine selector ── */
  .engine-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 16px; margin-bottom: 14px;
  }
  .engine-row .label { font-size: 12px; color: var(--text-dim); margin-right: 4px; }
  .engine-btn {
    border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px;
    font-size: 12px; cursor: pointer; background: var(--bg); color: var(--text-dim);
    transition: all 0.2s;
  }
  .engine-btn:hover { border-color: var(--purple); color: var(--purple); }
  .engine-btn.active { border-color: var(--purple); background: rgba(168,85,247,0.15); color: var(--purple); }
  .engine-sep { color: var(--border); font-size: 16px; }
  .model-badge {
    margin-left: auto; font-size: 11px; color: var(--text-dim);
    display: flex; align-items: center; gap: 5px;
  }
  .model-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
  .model-dot.loaded { background: var(--green); }
  .model-dot.loading { background: var(--yellow); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* ── Chart card ── */
  .chart-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; position: relative;
  }
  #chart { width: 100%; height: 520px; }
  .loading-overlay {
    position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(15,23,42,0.88); border-radius: 12px; z-index: 10;
    flex-direction: column; gap: 12px;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  .loading-hint { color: var(--text-dim); font-size: 13px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Stats ── */
  .stats { display: flex; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px; flex: 1; min-width: 110px;
  }
  .stat-card .lbl { font-size: 11px; color: var(--text-dim); margin-bottom: 3px; }
  .stat-card .val { font-size: 18px; font-weight: 600; }
  .val.green { color: var(--green); }
  .val.red   { color: var(--red); }
  .val.blue  { color: var(--accent); }
  .val.orange{ color: var(--orange); }
  .val.purple{ color: var(--purple); }
  .val.teal  { color: var(--teal); }
  .stat-card .sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  /* ── Compare panel ── */
  .compare-panel {
    display: none; background: var(--card); border: 1px solid rgba(168,85,247,0.3);
    border-radius: 10px; padding: 14px 18px; margin-top: 14px;
  }
  .compare-panel.show { display: block; }
  .compare-panel h3 { font-size: 13px; color: var(--purple); margin-bottom: 10px; }
  .compare-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .compare-table th { color: var(--text-dim); font-weight: 500; text-align: left; padding: 4px 10px 6px 0; }
  .compare-table td { padding: 4px 10px 4px 0; color: var(--text); }
  .compare-table tr.sep td { border-top: 1px solid var(--border); }
  .tag-tfm  { color: var(--teal); }
  .tag-cls  { color: var(--orange); }
  .tag-ens  { color: var(--purple); }

  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 520px; color: var(--text-dim);
  }
  .empty-state svg { width: 56px; height: 56px; margin-bottom: 14px; opacity: 0.35; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>本草价鉴</h1>
    <p>覆盖 303 个品种 · 13 年历史数据 · 指数反推 + 实际价格 + AI 预测</p>
  </header>

  <!-- Controls -->
  <div class="controls">
    <div class="field grow">
      <label>品种</label>
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="搜索品种名称…" autocomplete="off">
        <div class="dropdown" id="dropdown"></div>
      </div>
    </div>
    <div class="field">
      <label>开始日期</label>
      <input type="date" id="startDate">
    </div>
    <div class="field">
      <label>结束日期</label>
      <input type="date" id="endDate">
    </div>
    <div class="field">
      <label>时间范围</label>
      <div class="btn-row">
        <button class="btn" data-years="1">1年</button>
        <button class="btn" data-years="3">3年</button>
        <button class="btn active-blue" data-years="5">5年</button>
        <button class="btn" data-years="10">10年</button>
        <button class="btn" data-years="0">全部</button>
      </div>
    </div>
    <div class="field">
      <label>预测</label>
      <button class="btn" id="forecastBtn" style="border-color:var(--purple);color:var(--purple)">
        ✦ 预测未来180天
      </button>
    </div>
  </div>

  <!-- Engine selector（仅预测激活时显示） -->
  <div class="engine-row" id="engineRow" style="display:none">
    <span class="label">预测引擎：</span>
    <button class="engine-btn active" data-engine="ensemble">🔀 集成（推荐）</button>
    <span class="engine-sep">·</span>
    <button class="engine-btn" data-engine="timesfm">🤖 TimesFM 2.5</button>
    <span class="engine-sep">·</span>
    <button class="engine-btn" data-engine="classic">📈 经典方案</button>
    <div class="model-badge">
      <div class="model-dot" id="modelDot"></div>
      <span id="modelStatus">TimesFM 未加载</span>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-card">
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <div class="loading-hint" id="loadingHint">加载中…</div>
    </div>
    <div id="chart">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 3v18h18"/><path d="m7 14 4-4 4 4 5-5"/>
        </svg>
        <p>选择品种开始查看价格趋势</p>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats" style="display:none">
    <div class="stat-card"><div class="lbl">当前价格</div><div class="val blue" id="sCurrent">-</div></div>
    <div class="stat-card"><div class="lbl">最高价格</div><div class="val red"  id="sMax">-</div></div>
    <div class="stat-card"><div class="lbl">最低价格</div><div class="val green" id="sMin">-</div></div>
    <div class="stat-card"><div class="lbl">区间涨跌</div><div class="val" id="sChange">-</div></div>
    <div class="stat-card"><div class="lbl">数据天数</div><div class="val" id="sCount">-</div></div>
    <div class="stat-card"><div class="lbl">K值偏差</div><div class="val orange" id="sKcv">-</div></div>
    <div class="stat-card" id="sForecastCard" style="display:none">
      <div class="lbl">180天末预测</div>
      <div class="val purple" id="sForecast">-</div>
      <div class="sub" id="sForecastSub">-</div>
    </div>
  </div>

  <!-- Compare panel（集成模式下展示子引擎对比） -->
  <div class="compare-panel" id="comparePanel">
    <h3>📊 引擎对比（集成模式）</h3>
    <table class="compare-table">
      <tr>
        <th>时间节点</th>
        <th class="tag-ens">集成预测</th>
        <th class="tag-tfm">TimesFM</th>
        <th class="tag-cls">经典方案</th>
        <th>80%区间</th>
      </tr>
      <tbody id="compareBody"></tbody>
    </table>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────
const $ = id => document.getElementById(id);
let varieties = [], selectedName = '', chart = null;
let activeYears = 5, showForecast = false, currentEngine = 'ensemble';
let forecastCache = {};   // key: `${name}:${engine}`

// ─── Init ─────────────────────────────────────────────
async function init() {
  const resp = await fetch('/api/varieties');
  varieties = await resp.json();
  $('endDate').value = fmt(new Date());
  setYears(5);
  selectVariety('白术');
  pollModelStatus();
}

function fmt(d) { return d.toISOString().slice(0, 10); }

// ─── Model status polling ──────────────────────────────
async function pollModelStatus() {
  try {
    const r = await fetch('/api/model_status');
    const data = await r.json();
    const dot = $('modelDot');
    const lbl = $('modelStatus');
    if (data.timesfm_loaded) {
      dot.className = 'model-dot loaded';
      lbl.textContent = 'TimesFM 已就绪';
    } else {
      dot.className = 'model-dot';
      lbl.textContent = 'TimesFM 未加载';
    }
  } catch {}
  setTimeout(pollModelStatus, 5000);
}

// ─── Year presets ─────────────────────────────────────
function setYears(y) {
  activeYears = y;
  document.querySelectorAll('[data-years]').forEach(b => {
    b.classList.toggle('active-blue', parseInt(b.dataset.years) === y);
  });
  const today = new Date();
  $('endDate').value = fmt(today);
  if (y === 0) { $('startDate').value = '2013-04-16'; }
  else { const d = new Date(today); d.setFullYear(d.getFullYear() - y); $('startDate').value = fmt(d); }
}

document.querySelectorAll('[data-years]').forEach(btn => {
  btn.addEventListener('click', () => { setYears(parseInt(btn.dataset.years)); if (selectedName) loadChart(); });
});
$('startDate').addEventListener('change', () => { document.querySelectorAll('[data-years]').forEach(b => b.classList.remove('active-blue')); if (selectedName) loadChart(); });
$('endDate').addEventListener('change',   () => { document.querySelectorAll('[data-years]').forEach(b => b.classList.remove('active-blue')); if (selectedName) loadChart(); });

// ─── Variety search ───────────────────────────────────
const searchInput = $('searchInput'), dropdown = $('dropdown');

searchInput.addEventListener('focus', () => renderDropdown(searchInput.value));
searchInput.addEventListener('input', () => renderDropdown(searchInput.value));
document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) dropdown.classList.remove('show'); });

function renderDropdown(q) {
  const list = q ? varieties.filter(v => v.name.includes(q)) : varieties;
  if (!list.length) {
    dropdown.innerHTML = '<div class="dropdown-item" style="color:var(--text-dim)">无匹配结果</div>';
  } else {
    dropdown.innerHTML = list.slice(0, 60).map(v =>
      `<div class="dropdown-item${v.name === selectedName ? ' active' : ''}" data-name="${v.name}">
        <span>${v.name}</span>
        <span class="meta">${v.minDate.slice(0,4)}~${v.maxDate.slice(0,4)} · ${v.count}天</span>
       </div>`
    ).join('');
  }
  dropdown.classList.add('show');
  dropdown.querySelectorAll('[data-name]').forEach(el =>
    el.addEventListener('click', () => { selectVariety(el.dataset.name); dropdown.classList.remove('show'); })
  );
}

function selectVariety(name) {
  selectedName = name;
  searchInput.value = name;
  forecastCache = {};
  showForecast = false;
  $('forecastBtn').classList.remove('active-purple');
  $('forecastBtn').style.borderColor = 'var(--purple)';
  $('forecastBtn').style.color = 'var(--purple)';
  $('engineRow').style.display = 'none';
  $('comparePanel').classList.remove('show');
  $('sForecastCard').style.display = 'none';
  loadChart();
}

// ─── Forecast button ──────────────────────────────────
$('forecastBtn').addEventListener('click', async () => {
  if (!selectedName) return;
  showForecast = !showForecast;
  $('forecastBtn').classList.toggle('active-purple', showForecast);
  $('forecastBtn').style.borderColor = '';
  $('forecastBtn').style.color = '';
  $('engineRow').style.display = showForecast ? 'flex' : 'none';
  if (!showForecast) {
    $('comparePanel').classList.remove('show');
    $('sForecastCard').style.display = 'none';
  }
  await loadChart();
});

// ─── Engine selector ──────────────────────────────────
document.querySelectorAll('.engine-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    if (btn.dataset.engine === currentEngine) return;
    document.querySelectorAll('.engine-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentEngine = btn.dataset.engine;
    await loadChart();
  });
});

// ─── Fetch forecast (with cache) ─────────────────────
async function fetchForecast(name, engine) {
  const key = `${name}:${engine}`;
  if (forecastCache[key]) return forecastCache[key];

  setLoading(true, engine === 'classic'
    ? '运行经典预测模型（Prophet + Ridge + EMA）…'
    : engine === 'timesfm'
    ? '运行 TimesFM 2.5 时序基础模型（首次加载约10s）…'
    : '运行集成预测（TimesFM + Prophet + Ridge + EMA）…');

  // 标记 TimesFM 模型正在加载
  if (engine !== 'classic') {
    $('modelDot').className = 'model-dot loading';
    $('modelStatus').textContent = '模型加载中…';
  }

  const resp = await fetch(`/api/forecast?name=${encodeURIComponent(name)}&engine=${engine}`);
  setLoading(false);

  if (!resp.ok) { console.error('forecast failed'); return null; }
  const data = await resp.json();
  forecastCache[key] = data;
  return data;
}

// ─── Main loadChart ───────────────────────────────────
async function loadChart() {
  if (!selectedName) return;
  setLoading(true);

  const params = new URLSearchParams({ name: selectedName });
  if ($('startDate').value) params.set('start', $('startDate').value);
  if ($('endDate').value)   params.set('end',   $('endDate').value);

  const [priceResp, kResp] = await Promise.all([
    fetch(`/api/prices?${params}`),
    fetch(`/api/k_value?name=${encodeURIComponent(selectedName)}`),
  ]);
  const priceData = await priceResp.json();
  const kData = await kResp.json();
  setLoading(false);

  let fcData = null;
  if (showForecast) {
    fcData = await fetchForecast(selectedName, currentEngine);
  }

  renderChart(priceData, kData, fcData);
  renderStats(priceData, kData, fcData);
  renderCompare(fcData);
}

// ─── Loading helper ───────────────────────────────────
function setLoading(on, hint) {
  if (on) { $('loadingHint').textContent = hint || '加载中…'; $('loading').classList.add('show'); }
  else { $('loading').classList.remove('show'); }
}

// ─── Render chart ─────────────────────────────────────
function renderChart(priceData, kData, fc) {
  const el = $('chart');
  el.innerHTML = '';
  if (chart) { chart.dispose(); }
  chart = echarts.init(el, 'dark');
  window.addEventListener('resize', () => chart?.resize());

  const { data } = priceData;
  if (!data.length) {
    el.innerHTML = '<div class="empty-state"><p>该时间范围内无数据</p></div>';
    chart = null; return;
  }

  // 分拆 estimated / actual
  const estD = [], estP = [], actD = [], actP = [];
  let switchIdx = -1;
  data.forEach((d, i) => {
    if (d.source === 'actual') { if (switchIdx < 0) switchIdx = i; actD.push(d.date); actP.push(d.price); }
    else { estD.push(d.date); estP.push(d.price); }
  });
  if (actD.length && estD.length) { estD.push(actD[0]); estP.push(actP[0]); }

  let allDates = data.map(d => d.date);
  let fcDates = [], fcPoint = [], fcLower = [], fcUpper = [];
  let fcTfm = [], fcCls = [];

  if (fc?.forecast) {
    fc.forecast.forEach(f => { if (!allDates.includes(f.date)) allDates.push(f.date); });
    fc.forecast.forEach(f => {
      fcDates.push(f.date); fcPoint.push(f.price);
      fcLower.push(f.lower); fcUpper.push(f.upper);
      if (f.timesfm != null) fcTfm.push(f.timesfm);
      if (f.classic  != null) fcCls.push(f.classic);
    });
  }

  // 衔接桥接（从历史最后一点连到预测第一点）
  const bridgify = (vals) => {
    const bridge = [data[data.length - 1].price, ...vals];
    const bridgeDates = [data[data.length - 1].date, ...fcDates];
    return allDates.map(d => { const i = bridgeDates.indexOf(d); return i >= 0 ? bridge[i] : null; });
  };

  const legendData = ['估算价格', '实际价格'];
  if (fc) { legendData.push('预测中位线'); }
  if (fc && fcTfm.length) legendData.push('TimesFM');
  if (fc && fcCls.length) legendData.push('经典方案');

  const option = {
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'axis', backgroundColor: 'rgba(15,23,42,0.95)',
      borderColor: '#334155', textStyle: { color: '#e2e8f0', fontSize: 13 },
      formatter: params => {
        let html = `<b>${params[0]?.axisValue || ''}</b>`;
        params.forEach(p => {
          if (p.value == null) return;
          if (['置信上界','置信下界'].includes(p.seriesName)) return;
          const c = p.color || '#fff';
          html += `<br/><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${c};margin-right:6px"></span>${p.seriesName}：¥${p.value}`;
        });
        const lo = params.find(p => p.seriesName === '置信下界');
        const hi = params.find(p => p.seriesName === '置信上界');
        if (lo?.value != null && hi?.value != null) html += `<br/><span style="color:#64748b">80%区间：¥${lo.value} ~ ¥${hi.value}</span>`;
        return html;
      }
    },
    legend: { data: legendData, top: 8, right: 20, textStyle: { color: '#94a3b8' } },
    grid: { left: 64, right: 32, top: 50, bottom: 62 },
    xAxis: {
      type: 'category', data: allDates,
      axisLabel: { color: '#64748b', formatter: v => v.slice(0,7), interval: Math.max(Math.floor(allDates.length / 14), 1) },
      axisLine: { lineStyle: { color: '#334155' } }, splitLine: { show: false },
    },
    yAxis: {
      type: 'value', name: '元/kg', nameTextStyle: { color: '#64748b' },
      axisLabel: { color: '#64748b', formatter: '¥{value}' },
      axisLine: { show: false }, splitLine: { lineStyle: { color: '#1e293b' } },
    },
    dataZoom: [
      { type: 'inside', start: 0, end: 100 },
      { type: 'slider', start: 0, end: 100, height: 24, bottom: 10,
        borderColor: '#334155', backgroundColor: '#0f172a', fillerColor: 'rgba(59,130,246,0.15)',
        handleStyle: { color: '#3b82f6' }, textStyle: { color: '#64748b' },
        dataBackground: { lineStyle: { color: '#334155' }, areaStyle: { color: 'rgba(59,130,246,0.05)' } } }
    ],
    series: [],
  };

  // 估算价格
  option.series.push({
    name: '估算价格', type: 'line', symbol: 'none',
    data: allDates.map(d => { const i = estD.indexOf(d); return i >= 0 ? estP[i] : null; }),
    lineStyle: { color: '#3b82f6', width: 1.8 },
    areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(59,130,246,0.12)'},{offset:1,color:'rgba(59,130,246,0)'}]) },
    connectNulls: false,
  });
  // 实际价格
  option.series.push({
    name: '实际价格', type: 'line', symbol: 'none',
    data: allDates.map(d => { const i = actD.indexOf(d); return i >= 0 ? actP[i] : null; }),
    lineStyle: { color: '#f97316', width: 1.8 },
    areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(249,115,22,0.12)'},{offset:1,color:'rgba(249,115,22,0)'}]) },
    connectNulls: false,
  });

  // ── 预测系列 ──
  if (fc?.forecast) {
    // 置信区间
    option.series.push({
      name: '置信上界', type: 'line', symbol: 'none',
      data: bridgify(fcUpper), lineStyle: { opacity: 0 }, connectNulls: false,
      stack: 'conf', z: 2,
    });
    option.series.push({
      name: '置信下界', type: 'line', symbol: 'none',
      data: bridgify(fcLower), lineStyle: { opacity: 0 },
      areaStyle: { color: 'rgba(168,85,247,0.10)' }, connectNulls: false,
      stack: 'conf', z: 2,
    });

    // 集成/选定引擎的中位线
    option.series.push({
      name: '预测中位线', type: 'line', symbol: 'none', z: 6,
      data: bridgify(fcPoint),
      lineStyle: { color: '#a855f7', width: 2.5, type: 'dashed' },
      connectNulls: false,
    });

    // 集成模式下的子引擎对比线
    if (fcTfm.length) {
      option.series.push({
        name: 'TimesFM', type: 'line', symbol: 'none', z: 5,
        data: bridgify(fcTfm),
        lineStyle: { color: '#14b8a6', width: 1.5, type: 'dotted' },
        connectNulls: false,
      });
    }
    if (fcCls.length) {
      option.series.push({
        name: '经典方案', type: 'line', symbol: 'none', z: 5,
        data: bridgify(fcCls),
        lineStyle: { color: '#f97316', width: 1.5, type: 'dotted', opacity: 0.6 },
        connectNulls: false,
      });
    }

    // 预测起点标记
    option.series.push({
      type: 'line', data: [], markLine: {
        silent: true, symbol: 'none',
        lineStyle: { color: '#a855f7', type: 'dashed', width: 1 },
        label: { show: true, formatter: '← 预测区间', color: '#a855f7', fontSize: 11, position: 'insideEndTop' },
        data: [{ xAxis: fc.forecast[0].date }],
      },
    });

    // 自动滚动到显示最近1年 + 预测区间
    const totalLen = allDates.length, histLen = data.length;
    const startPct = Math.max(0, (histLen - 365) / totalLen * 100);
    setTimeout(() => chart?.dispatchAction({ type: 'dataZoom', start: startPct, end: 100 }), 50);
  }

  // 估算/实际分界线
  if (switchIdx > 0) {
    option.series.push({
      type: 'line', data: [], markLine: {
        silent: true, symbol: 'none',
        lineStyle: { color: '#475569', type: 'dashed', width: 1 },
        label: { show: true, formatter: '实际 →', color: '#64748b', fontSize: 10, position: 'insideStartTop' },
        data: [{ xAxis: allDates[switchIdx] }],
      },
    });
  }

  option.legend.selected = { '置信上界': true, '置信下界': true };
  chart.setOption(option);
}

// ─── Render stats ─────────────────────────────────────
function renderStats(priceData, kData, fc) {
  const { data } = priceData;
  if (!data.length) { $('stats').style.display = 'none'; return; }
  $('stats').style.display = 'flex';

  const prices = data.map(d => d.price);
  const first = prices[0], last = prices[prices.length - 1];
  const ch = last - first, chPct = (ch / first * 100).toFixed(1);

  $('sCurrent').textContent = `¥${last.toFixed(1)}`;
  $('sMax').textContent = `¥${Math.max(...prices).toFixed(1)}`;
  $('sMin').textContent = `¥${Math.min(...prices).toFixed(1)}`;
  const chEl = $('sChange');
  chEl.textContent = `${ch >= 0 ? '+' : ''}${ch.toFixed(1)} (${ch >= 0 ? '+' : ''}${chPct}%)`;
  chEl.className = `val ${ch >= 0 ? 'red' : 'green'}`;
  $('sCount').textContent = `${data.length} 天`;
  $('sKcv').textContent = kData ? `CV ${kData.kCv}%` : '-';

  if (fc?.forecast?.length) {
    $('sForecastCard').style.display = '';
    const lf = fc.forecast[fc.forecast.length - 1];
    const fch = lf.price - last, fchPct = (fch / last * 100).toFixed(1);
    $('sForecast').textContent = `¥${lf.price} (${fch >= 0 ? '+' : ''}${fchPct}%)`;
    $('sForecastSub').textContent = `80%区间 ¥${lf.lower} ~ ¥${lf.upper}`;
  } else {
    $('sForecastCard').style.display = 'none';
  }
}

// ─── Render compare table（集成模式）────────────────────
function renderCompare(fc) {
  const panel = $('comparePanel');
  if (!fc?.forecast || currentEngine !== 'ensemble' || !fc.forecast[0]?.timesfm) {
    panel.classList.remove('show'); return;
  }
  panel.classList.add('show');

  const checkpoints = [0, 29, 59, 89, 119, 179].filter(i => i < fc.forecast.length);
  const rows = checkpoints.map(i => {
    const f = fc.forecast[i];
    const sep = i === 0 ? '' : '';
    return `<tr class="${sep}">
      <td>${f.date}</td>
      <td class="tag-ens"><b>¥${f.price}</b></td>
      <td class="tag-tfm">¥${f.timesfm}</td>
      <td class="tag-cls">¥${f.classic}</td>
      <td style="color:var(--text-dim)">¥${f.lower} ~ ¥${f.upper}</td>
    </tr>`;
  }).join('');
  $('compareBody').innerHTML = rows;
}

init();
</script>
